<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>VoxLux Hero</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #040404;
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at 50% 38%, rgba(212, 175, 55, 0.08) 0%, rgba(212, 175, 55, 0) 34%),
        linear-gradient(180deg, #090909 0%, #040404 45%, #010101 100%);
    }

    #hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 520px;
      overflow: hidden;
      isolation: isolate;
      background: transparent;
    }

    #hero-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #hero::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 45%, rgba(214, 175, 101, 0.09) 0%, rgba(214, 175, 101, 0) 36%),
        linear-gradient(180deg, rgba(255,255,255,0.025) 0%, rgba(0,0,0,0.12) 100%);
      mix-blend-mode: screen;
      z-index: 2;
    }

    #hero::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(0,0,0,0) 52%, rgba(0,0,0,0.48) 100%);
      z-index: 3;
    }

    .grain {
      position: absolute;
      inset: -50%;
      pointer-events: none;
      z-index: 4;
      opacity: 0.03;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.9) 0.6px, transparent 0.7px);
      background-size: 8px 8px;
      mix-blend-mode: soft-light;
      animation: grainShift 10s steps(10) infinite;
    }

    @keyframes grainShift {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-1%, 1%); }
      50% { transform: translate(1%, -1%); }
      75% { transform: translate(-1%, -1%); }
      100% { transform: translate(0, 0); }
    }
  </style>
</head>
<body>
  <div id="hero" aria-hidden="true">
    <canvas id="hero-canvas"></canvas>
    <div class="grain"></div>
  </div>

  <script src="./hero.background.js"></script>
</body>
</html>
