<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <title>VoxLux Hero Background</title>

  <!--
    VoxLux Strategic — Hero Flythrough
    Pure visual layer. No text, no UI. Designed for a Wix Embed HTML iframe.
    Renders a tilted-aerial flythrough of a wireframe city in black + gold.
    Buildings draw themselves in on load, then the camera glides forward.
    Mouse: tilts the camera, modulates speed, casts a warm gold light.
  -->

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      cursor: crosshair;
    }

    #voxlux-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .voxlux-fallback {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: -1;
    }

    @media (prefers-reduced-motion: reduce) {
      #voxlux-canvas { opacity: 0.9; }
      html, body { cursor: default; }
    }
  </style>
</head>
<body>
  <div class="voxlux-fallback" aria-hidden="true"></div>
  <canvas id="voxlux-canvas" aria-hidden="true"></canvas>

  <script src="hero.background.js" defer></script>
</body>
</html>
